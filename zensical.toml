[project]
site_name        = "Lingo"
site_description = "Self-hosted company glossary. Slack, CLI, web UI, and AI agents — all from one service."
site_url         = "https://schinnam.github.io/lingo/"
repo_url         = "https://github.com/schinnam/lingo"
repo_name        = "schinnam/lingo"
edit_uri         = "edit/main/docs/"
docs_dir         = "docs"

[project.theme]
language = "en"
variant  = "modern"

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
media       = "(prefers-color-scheme: light)"
scheme      = "default"
primary     = "indigo"
accent      = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media       = "(prefers-color-scheme: dark)"
scheme      = "slate"
primary     = "indigo"
accent      = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.features]
"content.action.edit"   = true
"content.code.copy"     = true
"navigation.instant"    = true
"navigation.indexes"    = true
"navigation.top"        = true
"navigation.tracking"   = true
"search.highlight"      = true
"search.suggest"        = true
"toc.follow"            = true

[[project.nav]]
"Home" = "index.md"

[[project.nav]]
"Getting Started" = [
  { "Installation" = "getting-started/installation.md" },
  { "Quickstart"   = "getting-started/quickstart.md" },
  { "Configuration" = "getting-started/configuration.md" },
]

[[project.nav]]
"Usage" = [
  { "Web UI"         = "usage/web-ui.md" },
  { "CLI"            = "usage/cli.md" },
  { "Slack Bot"      = "usage/slack-bot.md" },
  { "MCP / AI Agents" = "usage/mcp.md" },
]

[[project.nav]]
"Deployment" = [
  { "Docker"      = "deployment/docker.md" },
  { "Production"  = "deployment/production.md" },
]

[[project.nav]]
"API Reference" = "api/reference.md"

[[project.nav]]
"Architecture" = "architecture.md"

[[project.nav]]
"Contributing" = "contributing.md"

[[project.nav]]
"Changelog" = "changelog.md"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums      = true
line_spans           = "__span"
pygments_lang_class  = true

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/schinnam/lingo"
