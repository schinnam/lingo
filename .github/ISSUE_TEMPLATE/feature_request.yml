name: Feature Request
description: Suggest an improvement or new feature for Lingo
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe the problem you're trying to solve and your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this solve? Who is affected and how often?
      placeholder: "As a Lingo admin, I often need to... but currently..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe what you'd like to happen. Be as specific as possible.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which part of Lingo does this primarily affect?
      options:
        - Slack Bot
        - MCP Server
        - Web UI
        - REST API
        - CLI
        - Scheduler / Background Jobs
        - Documentation
        - Other / Multiple
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you tried any workarounds or considered other approaches?
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Mockups, related issues, links to prior art, etc.
    validations:
      required: false
