name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lingo
          POSTGRES_PASSWORD: lingo
          POSTGRES_DB: lingo
        ports:
          - 5432:5432
        options: --health-cmd "pg_isready -U lingo" --health-interval 10s --health-timeout 5s --health-retries 5

    env:
      LINGO_DATABASE_URL: postgresql+asyncpg://lingo:lingo@localhost:5432/lingo_test
      LINGO_DEV_MODE: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Create lingo_test database
        run: psql postgresql://lingo:lingo@localhost:5432/lingo -c "CREATE DATABASE lingo_test"

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Run tests
        run: uv run pytest tests/ --cov=src/lingo
