# Publish Docker Image is intentionally disabled. To enable, uncomment the push
# trigger below and remove the workflow_dispatch-only block.
name: Publish Docker Image

on:
  workflow_dispatch: # manual trigger only — remove to enable on tag push
  # push:
  #   tags:
  #     - 'v*.*.*'

jobs:
  push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/schinnam/lingo
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
